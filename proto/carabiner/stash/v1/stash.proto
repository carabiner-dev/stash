syntax = "proto3";

package carabiner.stash.v1;

option go_package = "github.com/carabiner-dev/stash/api/carabiner/stash/v1;stashv1";

import "carabiner/stash/v1/attestation.proto";
import "carabiner/stash/v1/filters.proto";
import "carabiner/stash/v1/policy.proto";
import "carabiner/stash/v1/publickey.proto";

// StashService provides attestation storage and retrieval operations.
service StashService {
  // UploadAttestations stores one or more attestations.
  rpc UploadAttestations(UploadAttestationsRequest) returns (UploadAttestationsResponse);

  // GetAttestation retrieves an attestation by ID or hash.
  rpc GetAttestation(GetAttestationRequest) returns (GetAttestationResponse);

  // ListAttestations queries attestations with filters and pagination.
  rpc ListAttestations(ListAttestationsRequest) returns (ListAttestationsResponse);

  // DeleteAttestation removes an attestation.
  rpc DeleteAttestation(DeleteAttestationRequest) returns (DeleteAttestationResponse);

  // UpdateAttestation updates attestation metadata (currently not implemented).
  rpc UpdateAttestation(UpdateAttestationRequest) returns (UpdateAttestationResponse);

  // UploadPublicKey stores a public key for signature validation.
  rpc UploadPublicKey(UploadPublicKeyRequest) returns (UploadPublicKeyResponse);

  // DeletePublicKey removes a public key.
  rpc DeletePublicKey(DeletePublicKeyRequest) returns (DeletePublicKeyResponse);

  // ListPublicKeys retrieves all public keys for an organization.
  rpc ListPublicKeys(ListPublicKeysRequest) returns (ListPublicKeysResponse);

  // PushPolicies stores one or more policy documents. Each document's lineage
  // is taken from its own id.
  rpc PushPolicies(PushPoliciesRequest) returns (PushPoliciesResponse);

  // AppendPolicy stores one document as the next version of a named lineage.
  // The lineage is supplied out of band, so the document need carry neither an
  // id nor a version.
  rpc AppendPolicy(AppendPolicyRequest) returns (AppendPolicyResponse);

  // GetPolicy retrieves one version of a policy lineage, or its latest version
  // when no version is given.
  rpc GetPolicy(GetPolicyRequest) returns (GetPolicyResponse);

  // DeletePolicy removes a whole policy lineage, or one version of it when a
  // version is given. Deleting the current head makes the previous version the
  // lineage's latest.
  rpc DeletePolicy(DeletePolicyRequest) returns (DeletePolicyResponse);

  // HealthCheck checks service health.
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// UploadAttestationsRequest contains attestations to upload.
message UploadAttestationsRequest {
  // Namespace for the attestations (empty string = default namespace).
  string namespace = 1;

  // Raw attestation JSON (max 1MB each, max 100 attestations).
  repeated bytes attestations = 2;

  // Organization ID (required, must be valid DNS hostname).
  string org_id = 10;
}

// UploadAttestationsResponse contains upload results.
message UploadAttestationsResponse {
  repeated AttestationResult results = 1;
}

// AttestationResult represents the result of uploading a single attestation.
message AttestationResult {
  string attestation_id = 1;
  string content_hash = 2;
  bool stored = 3;
  bool validated = 4;
  string error = 5; // Error message if storage or validation failed
  bool existed = 6; // True when an identical attestation was already stored (idempotent upload)
}

// GetAttestationRequest retrieves an attestation.
message GetAttestationRequest {
  // Namespace (empty string = default namespace).
  string namespace = 1;

  oneof identifier {
    string attestation_id = 2;
    string content_hash = 3;
    string predicate_hash = 4;
  }

  // If true, only return raw attestation
  bool raw_only = 5;

  // If true, only return predicate
  bool predicate_only = 6;

  // Organization ID (required, must be valid DNS hostname).
  string org_id = 10;
}

// GetAttestationResponse contains attestation data.
message GetAttestationResponse {
  Attestation attestation = 1;
  bytes raw_attestation = 2;
  bytes raw_predicate = 3;
}

// ListAttestationsRequest queries attestations.
message ListAttestationsRequest {
  // Namespace (empty string = default namespace).
  string namespace = 1;

  Filters filters = 2;
  Cursor cursor = 3;

  // Organization ID (required, must be valid DNS hostname).
  string org_id = 10;
}

// ListAttestationsResponse contains paginated attestation list.
message ListAttestationsResponse {
  repeated Attestation attestations = 1;
  Cursor next_cursor = 2;
}

// DeleteAttestationRequest deletes an attestation.
message DeleteAttestationRequest {
  // Namespace (empty string = default namespace).
  string namespace = 1;

  oneof identifier {
    string attestation_id = 2;
    string content_hash = 3;
  }

  // Organization ID (required, must be valid DNS hostname).
  string org_id = 10;
}

// DeleteAttestationResponse confirms deletion.
message DeleteAttestationResponse {
  bool deleted = 1;
}

// UpdateAttestationRequest updates attestation metadata.
message UpdateAttestationRequest {
  // Namespace (empty string = default namespace).
  string namespace = 1;

  string attestation_id = 2;
  // Future: metadata updates

  // Organization ID (required, must be valid DNS hostname).
  string org_id = 10;
}

// UpdateAttestationResponse confirms update.
message UpdateAttestationResponse {
  // Currently returns NOT_IMPLEMENTED status
}

// PushPoliciesRequest carries policy documents to store (max 100).
message PushPoliciesRequest {
  // Namespace for the policies (empty string = default namespace).
  string namespace = 1;

  // Raw policy documents: bare policy JSON or an attestation envelope wrapping
  // one (a signed sigstore bundle or an unsigned DSSE).
  repeated bytes policies = 2;

  // Organization ID (required, must be valid DNS hostname).
  string org_id = 10;
}

// PushPoliciesResponse reports the outcome of each submitted document, in order.
message PushPoliciesResponse {
  repeated PolicyResult results = 1;
}

// AppendPolicyRequest stores one document as the next version of a lineage.
message AppendPolicyRequest {
  // Namespace (empty string = default namespace).
  string namespace = 1;

  // The lineage to append to. Created if it does not exist.
  string lineage_id = 2;

  // The policy document.
  bytes policy = 3;

  // Organization ID (required, must be valid DNS hostname).
  string org_id = 10;
}

// AppendPolicyResponse reports the outcome of an append.
message AppendPolicyResponse {
  PolicyResult result = 1;
}

// GetPolicyRequest retrieves a policy version.
message GetPolicyRequest {
  // Namespace (empty string = default namespace).
  string namespace = 1;

  // The lineage to read.
  string lineage_id = 2;

  // The version to read. When absent, the lineage's latest version is returned;
  // versions are 0-based, so an explicit 0 is version 0, not "latest".
  optional int64 version = 3;

  // If true, only return the raw stored document.
  bool raw_only = 4;

  // Organization ID (required, must be valid DNS hostname).
  string org_id = 10;
}

// GetPolicyResponse carries a policy version and its stored bytes.
message GetPolicyResponse {
  Policy policy = 1;
  bytes raw = 2; // the stored policy document
}

// DeletePolicyRequest removes a lineage or one of its versions.
message DeletePolicyRequest {
  // Namespace (empty string = default namespace).
  string namespace = 1;

  // The lineage to delete from.
  string lineage_id = 2;

  // The version to delete. When absent the whole lineage (every version) is
  // deleted; when present only that 0-based version is deleted.
  optional int64 version = 3;

  // Organization ID (required, must be valid DNS hostname).
  string org_id = 10;
}

// DeletePolicyResponse reports how many versions were deleted.
message DeletePolicyResponse {
  int64 deleted = 1;
}

// HealthCheckRequest checks service health.
message HealthCheckRequest {}

// HealthCheckResponse contains health status.
message HealthCheckResponse {
  string status = 1; // "healthy" or "unhealthy"
  map<string, string> components = 2; // Component health details
}
